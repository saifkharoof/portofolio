name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy triggered on Render."

      - name: Wait for deploy to propagate
        run: sleep 30

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_BACKEND_URL }}/")
          echo "Health check returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Backend health check returned $STATUS — deploy may still be building. Check Render dashboard."
          fi
